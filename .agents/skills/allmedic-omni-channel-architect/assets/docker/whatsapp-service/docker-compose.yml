version: '3.8'

services:
  whatsapp-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: allmedic-whatsapp
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - WEBHOOK_URL=${WEBHOOK_URL:-http://host.docker.internal:3000/api/webhooks/whatsapp}
      - NODE_ENV=production
      - WA_SERVICE_HOST=0.0.0.0
      - WA_SERVICE_PORT=8080
    volumes:
      - whatsapp-session:/app/session
    networks:
      - allmedic-network
    # Optimización para KVM2 (RAM/CPU limitados)
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD", "node", "src/healthcheck.js"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    # Keep-alive: si falla, reiniciar automáticamente
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  whatsapp-session:
    driver: local

networks:
  allmedic-network:
    driver: bridge
