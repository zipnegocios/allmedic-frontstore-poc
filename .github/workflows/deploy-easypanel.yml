# =============================================================================
# GitHub Actions — Autodeploy en EasyPanel
# =============================================================================
# Este workflow se ejecuta en cada push a la rama `main`.
# Envía un webhook GET a EasyPanel para que reconstruya y redeploye la app.
#
# El webhook se configura en EasyPanel:
#   Services → allmedic-frontstore → Settings → Webhooks
# =============================================================================

name: Deploy to EasyPanel

on:
  push:
    branches: [main]
  workflow_dispatch:  # Permite ejecutar manualmente desde GitHub

jobs:
  deploy:
    name: Trigger EasyPanel Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Trigger EasyPanel Webhook
        run: |
          echo "🚀 Enviando webhook a EasyPanel..."
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X GET \
            "http://31.220.56.1:3000/api/deploy/aca21d9edbe2a779389846584ebf5825c7c3ef0b415e2bbe")

          if [ "$HTTP_CODE" -eq 200 ] || [ "$HTTP_CODE" -eq 204 ]; then
            echo "✅ EasyPanel deploy triggered successfully (HTTP $HTTP_CODE)"
          else
            echo "❌ EasyPanel webhook failed with HTTP $HTTP_CODE"
            exit 1
          fi
