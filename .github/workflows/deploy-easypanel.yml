# =============================================================================
# GitHub Actions — Autodeploy en EasyPanel
# =============================================================================
# Este workflow se ejecuta en cada push a la rama `main`.
# Envía un webhook a EasyPanel para que reconstruya y redeploye la app.
#
# Configuración requerida en GitHub:
#   Settings → Secrets and variables → Actions → New repository secret
#   Name:  EASYPANEL_WEBHOOK_URL
#   Value: https://easypanel.TU-DOMINIO.com/api/services/allmedic-frontstore/webhook/deploy?token=XXXXXXXX
# =============================================================================

name: Deploy to EasyPanel

on:
  push:
    branches: [main]
  workflow_dispatch:  # Permite ejecutar manualmente desde GitHub

jobs:
  deploy:
    name: Trigger EasyPanel Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript check
        run: npx tsc --noEmit

      - name: Run build
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          NEXT_PUBLIC_WHATSAPP_NUMBER: ${{ secrets.NEXT_PUBLIC_WHATSAPP_NUMBER }}
          AUTH_TRUST_HOST: true

      - name: Trigger EasyPanel webhook
        run: |
          echo "🚀 Triggering EasyPanel deploy..."
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "Content-Type: application/json" \
            "${{ secrets.EASYPANEL_WEBHOOK_URL }}")

          if [ "$HTTP_CODE" -eq 200 ] || [ "$HTTP_CODE" -eq 204 ]; then
            echo "✅ EasyPanel deploy triggered successfully (HTTP $HTTP_CODE)"
          else
            echo "❌ EasyPanel webhook failed with HTTP $HTTP_CODE"
            exit 1
          fi
