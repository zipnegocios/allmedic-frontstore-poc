# =============================================================================
# AllMedic Frontstore — Docker Compose (desarrollo local + simulación EasyPanel)
# =============================================================================
# Uso:
#   docker-compose up --build        # Primera vez o después de cambios
#   docker-compose up -d             # En segundo plano
#   docker-compose down              # Detener
#   docker-compose logs -f app       # Ver logs de la app
# =============================================================================

version: "3.9"

services:
  # ─── Aplicación Next.js ───
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Estos ARG se usan SOLO en build time
        # En producción EasyPanel los inyecta como ENV
        DATABASE_URL: ${DATABASE_URL}
        AUTH_SECRET: ${AUTH_SECRET}
        NEXT_PUBLIC_WHATSAPP_NUMBER: ${NEXT_PUBLIC_WHATSAPP_NUMBER}
        AUTH_TRUST_HOST: "true"
    container_name: allmedic-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # ─── Base de datos (PostgreSQL externo de EasyPanel) ───
      DATABASE_URL: ${DATABASE_URL}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}

      # ─── Autenticación (NextAuth.js v5) ───
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_TRUST_HOST: "true"
      AUTH_URL: ${AUTH_URL:-http://localhost:3000}

      # ─── WhatsApp ───
      NEXT_PUBLIC_WHATSAPP_NUMBER: ${NEXT_PUBLIC_WHATSAPP_NUMBER}
      VITE_WHATSAPP_NUMBER: ${VITE_WHATSAPP_NUMBER}

      # ─── OpenAI (opcional) ───
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}

      # ─── Instagram (opcional) ───
      IG_APP_SECRET: ${IG_APP_SECRET:-}
      IG_VERIFY_TOKEN: ${IG_VERIFY_TOKEN:-}
      IG_ACCESS_TOKEN: ${IG_ACCESS_TOKEN:-}
      IG_PAGE_ID: ${IG_PAGE_ID:-}

      # ─── WhatsApp Web Service (opcional) ───
      WA_WEBHOOK_URL: ${WA_WEBHOOK_URL:-}
      WA_SERVICE_URL: ${WA_SERVICE_URL:-}

      # ─── App config ───
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0

      # ─── Fallback a dummy data si la DB no responde ───
      FORCE_DUMMY_DATA: ${FORCE_DUMMY_DATA:-false}

    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

    networks:
      - allmedic-network

    # Volumen para persistir logs (opcional)
    # volumes:
    #   - ./logs:/app/logs

networks:
  allmedic-network:
    driver: bridge
